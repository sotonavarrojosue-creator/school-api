name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff mypy
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy . || echo "Mypy not fully configured"
      - name: Test
        run: pytest -v || echo "No tests yet"
